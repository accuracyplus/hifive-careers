function fmtDate(val) {
  if (!val) return '';
  const s = String(val).trim();
  if (/^\d{2}-\d{2}-\d{4}$/.test(s)) return s;
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) { const p = s.split('T')[0].split('-'); return p[2]+'-'+p[1]+'-'+p[0]; }
  const n = parseFloat(s);
  if (!isNaN(n) && n > 1000) {
    const dt = new Date(new Date(1899,11,30).getTime() + n*86400000);
    return String(dt.getDate()).padStart(2,'0')+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+dt.getFullYear();
  }
  return s;
}
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const k in (attrs||{})) {
    if (attrs[k] == null) continue;
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(e.style, attrs[k]);
    // Boolean HTML attributes (disabled, checked, readonly, etc.) — presence alone
    // disables/enables the element regardless of string value, so set/remove the
    // attribute itself rather than ever writing the string "false".
    else if (typeof attrs[k] === 'boolean') {
      if (attrs[k]) e.setAttribute(k, '');
      else e.removeAttribute(k);
    }
    else e.setAttribute(k, attrs[k]);
  }
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(c) : c);
  });
  return e;
}
function svg(paths, attrs) {
  attrs = attrs || {};
  const w = attrs.size || 18, stroke = attrs.color || 'currentColor', sw = attrs.sw || 2;
  const wrap = document.createElement('span');
  wrap.style.display = 'inline-flex';
  wrap.style.flexShrink = '0';
  wrap.innerHTML = '<svg width="'+w+'" height="'+w+'" viewBox="0 0 24 24" fill="none" stroke="'+stroke+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round">'+paths+'</svg>';
  return wrap;
}
function scrollToId(id) {

  if (target) window.scrollTo({ top: target.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
}
function fullEntityName(short) {

async function loadPositions() {
  try {
    const res = await fetch(WORKER + '/get-open-positions');
    const data = await res.json();
    S.positions = data.positions || [];
  } catch (e) { S.positions = []; }

  // Full master position list (for "Other / Not Listed" suggestions) — every
  // position in the Config sheet, not just currently-open requisitions.
  try {
    const cfgRes = await fetch(WORKER + '/get-config');
    const cfgData = await cfgRes.json();
    S.allPositions = cfgData.positions || [];
  } catch (e) { S.allPositions = []; }

  S.loading = false;
  render();
}

function animateStatCount() {
  const target = 160, dur = 1200, t0 = performance.now();
  function tick(now) {
    const k = Math.min(1, (now - t0) / dur);
    const eased = 1 - Math.pow(1 - k, 3);
    S.statCount = Math.round(target * eased);
    const elS = document.getElementById('statCountVal');
    if (elS) elS.textContent = S.statCount + '+';
    if (k < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function filteredPositions() {
  const s = S.search.toLowerCase().trim();
  return S.positions.filter(p => {
    const pos = (p.customPosition || p.position || '').toLowerCase();
    return (!s || pos.includes(s)) && (!S.entity || p.entity === S.entity);
  });
}
function posVM(p) {
  const filled = p.filled || p.filledCount || 0;
  const total = p.headcount || p.count || 1;
  const pct = Math.min(100, Math.round((filled/total)*100));
  const isFull = pct >= 100;
  const isAlmost = pct >= 50 && pct < 100;

  return { fontSize:'12.5px', fontWeight:'700', padding:'6px 15px', borderRadius:'99px', background:x.bg, color:x.color };
}
function buildTimeline(status) {
  const cur = STATUS_STEPS.indexOf(status);
  const nodes = [];
  STATUS_STEPS.forEach((s, i) => {
    const done = i < cur, current = i === cur;
    const dotBg = done ? '#1e8449' : current ? 'linear-gradient(135deg,#d6204a,#6e0b2a)' : 'rgba(255,255,255,.14)';
    const dotColor = (done||current) ? '#fff' : 'rgba(255,255,255,.45)';
    nodes.push({ isDot:true, dotText: done?'✓':String(i+1), dotBg, dotColor, labelText: statusLabel(s),
      labelColor: current?'#ff9fb2':done?'rgba(255,255,255,.7)':'rgba(255,255,255,.4)', labelWeight: current?'700':'500' });
    if (i < STATUS_STEPS.length-1) nodes.push({ isLine:true, lineBg: done?'#1e8449':'rgba(255,255,255,.14)' });
  });
  return nodes;
}

function guessName(fn) {
  return fn.replace(/\.(pdf|doc|docx|jpg|jpeg|png)$/i,'').replace(/[_\-.]+/g,' ')
    .replace(/\b(cv|resume|application)\b/gi,'').trim()
    .split(/\s+/).map(w => w ? w[0].toUpperCase()+w.slice(1).toLowerCase() : '').join(' ').trim();
}
function addBulk(fileList) {
  const add = Array.from(fileList).map(f => ({ file:f, fileName:f.name, name:guessName(f.name), position:'', customPosition:'', facility:'', email:'', phone:'', status:'idle' }));
  S.bulkFiles = [...S.bulkFiles, ...add];
  S.bulkDone = false;
  render();
}
function setBulkField(i, k, v, skipRender) { S.bulkFiles[i] = { ...S.bulkFiles[i], [k]: v }; if (!skipRender) render(); }
function removeBulk(i) { S.bulkFiles = S.bulkFiles.filter((_,j) => j !== i); render(); }

async function uploadAllBulk() {
  if (S.bulkUploading) return;
  const snapshot = [...S.bulkFiles];
  const pending = snapshot.filter(f => f.status === 'idle');
  if (!pending.length) return;
  const resolvedPosition = (f) => f.position === 'Other' ? (f.customPosition||'').trim() : f.position;
  const missing = pending.find(f => !f.name?.trim() || !resolvedPosition(f) || !f.facility);
  if (missing) { setS({ bulkStatus: t('Please fill name, position and facility for every CV before uploading.','يرجى تعبئة الاسم والوظيفة والمنشأة لكل سيرة ذاتية قبل الرفع.') }); return; }
  setS({ bulkUploading:true, bulkProgress:0, bulkStatus:'' });
  let done = 0;
  for (let i = 0; i < snapshot.length; i++) {
    if (snapshot[i].status !== 'idle') continue;
    setBulkField(i, 'status', 'loading');
    try {
      const f = snapshot[i];
      const fd = new FormData();
      fd.append('file', f.file); fd.append('name', f.name||'Unknown'); fd.append('position', resolvedPosition(f)); fd.append('facility', f.facility||''); fd.append('email', f.email||''); fd.append('phone', f.phone||''); fd.append('source','Careers Page');
      const res = await fetch(WORKER + '/upload-cv-public', { method:'POST', body:fd });
      const data = await res.json();
      if (!data.success) throw new Error(data.error||'fail');
      setBulkField(i, 'status', 'done'); done++;
    } catch(e) { setBulkField(i, 'status', 'error'); }
    S.bulkProgress = Math.round((done/pending.length)*100);
    S.bulkStatus = t('Uploaded','تم رفع')+' '+done+' '+t('of','من')+' '+pending.length+'…';
    render();
  }
  S.bulkUploading = false;
  if (S.bulkFiles.every(f=>f.status==='done') && S.bulkFiles.length) { S.bulkDone = true; S.bulkFiles = []; }
  render();
}

function formField(label, type, stateKey, placeholder) {
  // Per-field validators — run on every keystroke so feedback is immediate
  const validators = {
    formPhone: v => v && !/^[0-9+\s\-]{7,15}$/.test(v.trim()) ? 'Enter a valid phone number' : '',
    formEmail: v => v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()) ? 'Enter a valid email address' : '',
  };
  const required = ['formName','formPhone','formEmail'];

  const wrap = el('div', { style:{display:'flex',flexDirection:'column',gap:'5px'} },
    el('label', { style:{fontSize:'12.5px',fontWeight:'600',color:'var(--c-ink2)'} }, label)
  );
  const input = document.createElement('input');
  input.type = type; input.value = S[stateKey]; if (placeholder) input.placeholder = placeholder;
  input.style.cssText = 'border:1px solid rgba(180,18,58,.18);border-radius:11px;padding:12px 14px;font-size:14px;outline:none;background:#fff;color:#1c1b22;width:100%;box-sizing:border-box;transition:border-color .2s';

  const hint = el('span', { style:{fontSize:'11.5px',fontWeight:'600',color:'#c0392b',display:'none'} });

  const validate = (val, touched) => {
    let msg = '';
    if (touched && required.includes(stateKey) && !val.trim()) msg = label + ' is required';
    else if (validators[stateKey]) msg = validators[stateKey](val);
    hint.textContent = msg;
    hint.style.display = msg ? 'block' : 'none';
    input.style.borderColor = msg ? '#c0392b' : (val && !msg) ? 'rgba(30,132,73,.5)' : 'rgba(180,18,58,.18)';
  };

  input.addEventListener('input', e => { S[stateKey] = e.target.value; validate(e.target.value, false); });
  input.addEventListener('blur',  e => { validate(e.target.value, true); });
  input.addEventListener('focus', () => { input.style.borderColor = '#d6204a'; });

  wrap.appendChild(input);
  wrap.appendChild(hint);
  return wrap;
}

// makeBeams(w, h) — builds an Aceternity-style Background Beams SVG.
// Each beam is an animated SVG path that travels diagonally across the
// container. The stroke colour is brand maroon fading to gold. The beams
// fill whatever container they're placed inside (position:absolute, inset 0).
function makeBeams(w, h) {
  // 20 diagonal paths, each offset slightly, matching the Aceternity path set
  const pathTemplates = [
    [-380,-189,152,343,684,875],[-373,-197,159,335,691,867],
    [-366,-205,166,327,698,859],[-359,-213,173,319,705,851],
    [-352,-221,180,311,712,843],[-345,-229,187,303,719,835],
    [-338,-237,194,295,726,827],[-331,-245,201,287,733,819],
    [-324,-253,208,279,740,811],[-317,-261,215,271,747,803],
    [-310,-269,222,263,754,795],[-303,-277,229,255,761,787],
    [-296,-285,236,247,768,779],[-289,-293,243,239,775,771],
    [-282,-301,250,231,782,763],[-275,-309,257,223,789,755],
    [-268,-317,264,215,796,747],[-261,-325,271,207,803,739],
    [-254,-333,278,199,810,731],[-247,-341,285,191,817,723],
  ];

  // Scale paths from the original 500×875 viewBox to the actual container
  const vw = 500, vh = 875;
  const scaleX = n => ((n + 380) / (vw + 380)) * (w || 760);
  const scaleY = n => ((n + 341) / (vh + 341)) * (h || 400);

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('xmlns', svgNS);
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', '100%');
  svg.setAttribute('viewBox', `0 0 ${w||760} ${h||400}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
  svg.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:1';

  const defs = document.createElementNS(svgNS, 'defs');

  // Radial mask so beams fade out toward edges instead of hard-clipping
  const mask = document.createElementNS(svgNS, 'radialGradient');
  mask.setAttribute('id', 'hfb-mask');
  mask.setAttribute('cx', '50%'); mask.setAttribute('cy', '50%');
  mask.setAttribute('r', '50%'); mask.setAttribute('gradientUnits', 'userSpaceOnUse');
  mask.setAttribute('gradientTransform', `translate(${(w||760)/2} ${(h||400)/2}) scale(${w||760} ${h||400}) translate(-0.5 -0.5)`);
  [['0%','white','1'],['100%','white','0']].forEach(([offset, color, opacity]) => {
    const stop = document.createElementNS(svgNS, 'stop');
    stop.setAttribute('offset', offset);
    stop.setAttribute('stop-color', color);
    stop.setAttribute('stop-opacity', opacity);
    mask.appendChild(stop);
  });
  defs.appendChild(mask);

  // Linear gradient along each beam: maroon → gold → maroon
  const beamGrad = document.createElementNS(svgNS, 'linearGradient');
  beamGrad.setAttribute('id', 'hfb-grad');
  beamGrad.setAttribute('gradientUnits', 'userSpaceOnUse');
  beamGrad.setAttribute('x1', '0%'); beamGrad.setAttribute('y1', '0%');
  beamGrad.setAttribute('x2', '100%'); beamGrad.setAttribute('y2', '100%');
  [
    ['0%',   'transparent',  '0'],
    ['20%',  '#d6204a',      '0.12'],
    ['50%',  '#f5a623',      '0.55'],
    ['80%',  '#d6204a',      '0.12'],
    ['100%', 'transparent',  '0'],
  ].forEach(([offset, color, opacity]) => {
    const s = document.createElementNS(svgNS, 'stop');
    s.setAttribute('offset', offset);
    s.setAttribute('stop-color', color);
    s.setAttribute('stop-opacity', opacity);
    beamGrad.appendChild(s);
  });
  defs.appendChild(beamGrad);

  // Glow gradient (wider, softer — layered behind the main beam)
  const glowGrad = document.createElementNS(svgNS, 'linearGradient');
  glowGrad.setAttribute('id', 'hfb-glow');
  glowGrad.setAttribute('gradientUnits', 'userSpaceOnUse');
  glowGrad.setAttribute('x1', '0%'); glowGrad.setAttribute('y1', '0%');
  glowGrad.setAttribute('x2', '100%'); glowGrad.setAttribute('y2', '100%');
  [
    ['0%',   'transparent', '0'],
    ['20%',  '#6e0b2a',     '0.06'],
    ['50%',  '#f5a623',     '0.25'],
    ['80%',  '#6e0b2a',     '0.06'],
    ['100%', 'transparent', '0'],
  ].forEach(([offset, color, opacity]) => {
    const s = document.createElementNS(svgNS, 'stop');
    s.setAttribute('offset', offset);
    s.setAttribute('stop-color', color);
    s.setAttribute('stop-opacity', opacity);
    glowGrad.appendChild(s);
  });
  defs.appendChild(glowGrad);

  svg.appendChild(defs);

  // Group masked to fade edges
  const g = document.createElementNS(svgNS, 'g');
  g.setAttribute('mask', 'url(#hfb-mask)');

  pathTemplates.forEach(([x1,y1,mx,my,x2,y2], i) => {
    // Convert from the original coordinate space
    const d = `M${scaleX(x1)} ${scaleY(y1)}C${scaleX(x1)} ${scaleY(y1)} ${scaleX(mx)} ${scaleY(my)} ${scaleX(x2)} ${scaleY(y2)}`;

    // Glow layer (thicker, softer, offset timing)
    const glow = document.createElementNS(svgNS, 'path');
    glow.setAttribute('d', d);
    glow.setAttribute('stroke', 'url(#hfb-glow)');
    glow.setAttribute('stroke-width', '6');
    glow.setAttribute('fill', 'none');
    glow.setAttribute('class', 'hf-beam-path');
    glow.style.animationDuration = `${8 + (i % 7) * 1.4}s`;
    glow.style.animationDelay = `${-(i * 1.1)}s`;
    g.appendChild(glow);

    // Main beam (sharp, bright)
    const beam = document.createElementNS(svgNS, 'path');
    beam.setAttribute('d', d);
    beam.setAttribute('stroke', 'url(#hfb-grad)');
    beam.setAttribute('stroke-width', '1.5');
    beam.setAttribute('fill', 'none');
    beam.setAttribute('class', 'hf-beam-path');
    beam.style.animationDuration = `${8 + (i % 7) * 1.4}s`;
    beam.style.animationDelay = `${-(i * 1.1)}s`;
    g.appendChild(beam);
  });

  svg.appendChild(g);
  return svg;
}

function toggleDark() {
  S.darkMode = !S.darkMode;
  try { localStorage.setItem('hf_careers_dark', S.darkMode ? '1' : '0'); } catch {}
  render();
}

function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  document.documentElement.lang = S.lang;
  document.body.style.direction = dir();
  if (S.darkMode) document.body.setAttribute('data-theme', 'dark');
  else document.body.removeAttribute('data-theme');

  const page = el('div', { style:{position:'relative',minHeight:'100vh',overflow:'hidden',direction:dir()} });

  const orbs = el('div', { style:{position:'fixed',inset:'0',zIndex:'0',pointerEvents:'none',overflow:'hidden'} },
    el('div', { style:{position:'absolute',top:'-120px',left:'-80px',width:'520px',height:'520px',borderRadius:'50%',background:'radial-gradient(circle at 30% 30%,rgba(214,32,74,.22),transparent 65%)',filter:'blur(20px)',animation:'hf-drift 22s ease-in-out infinite'} }),
    el('div', { style:{position:'absolute',top:'30%',right:'-140px',width:'560px',height:'560px',borderRadius:'50%',background:'radial-gradient(circle at 50% 50%,rgba(120,11,42,.16),transparent 66%)',filter:'blur(24px)',animation:'hf-drift 28s ease-in-out infinite reverse'} }),
    el('div', { style:{position:'absolute',bottom:'-160px',left:'25%',width:'480px',height:'480px',borderRadius:'50%',background:'radial-gradient(circle at 50% 50%,rgba(196,150,120,.18),transparent 66%)',filter:'blur(22px)',animation:'hf-drift 26s ease-in-out infinite'} })
  );
  page.appendChild(orbs);

  const content = el('div', { style:{position:'relative',zIndex:'2'} });
  content.appendChild(renderNav());
  content.appendChild(renderHero());
  content.appendChild(renderEntitiesStrip());
  content.appendChild(renderPositions());
  content.appendChild(renderWhy());
  content.appendChild(renderTracker());
  content.appendChild(renderBulkDrop());
  content.appendChild(renderFooter());
  page.appendChild(content);

  root.appendChild(page);

  const modal = renderApplyModal();
  if (modal) root.appendChild(modal);
  const jdModal = renderJDModal();
  if (jdModal) root.appendChild(jdModal);
}

try {
  render();
// Rotate featured opening every 5 seconds
setInterval(() => {
  const openCount = S.positions.filter(p => ((p.headcount||p.count||1)-(p.filledCount||0)) > 0).length;
  if (openCount > 1) { S.featuredIdx = (S.featuredIdx + 1) % openCount; render(); }
}, 5000);
  loadPositions();
  animateStatCount();
} catch (e) {
  document.getElementById('root').innerHTML = '<div style="padding:60px 20px;text-align:center;font-family:sans-serif;color:#b4123a">Something went wrong loading this page. Please refresh, or contact career@hifiveholding.ae if the issue continues.</div>';
  console.error('CareersPage error:', e);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
