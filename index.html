    doneTitle: t('All CVs uploaded!','تم رفع جميع السير!'),

    modalSubtitle: t('Submit your CV and basic details. Our HR team will reach out within 3–5 business days.','أرسل سيرتك وتفاصيلك الأساسية. سيتواصل فريقنا خلال 3-5 أيام عمل.'),
    fullName: t('Full Name *','الاسم الكامل *'),
    phone: t('Phone *','رقم الهاتف *'),
    email: t('Email *','البريد الإلكتروني *'),

  };

      const k = Math.min(1, (now - t0) / dur);
      const eased = 1 - Math.pow(1 - k, 3);
      setStatCount(Math.round(target * eased));
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  const fmtDate = (val) => {
    if (!val) return '';
    const s = String(val).trim();
    if (/^\d{2}-\d{2}-\d{4}$/.test(s)) return s;
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) { const [y,m,d] = s.split('T')[0].split('-'); return `${d}-${m}-${y}`; }
    const n = parseFloat(s);
    if (!isNaN(n) && n > 1000) { const dt = new Date(new Date(1899,11,30).getTime() + n*86400000); return `${String(dt.getDate()).padStart(2,'0')}-${String(dt.getMonth()+1).padStart(2,'0')}-${dt.getFullYear()}`; }

    const total = p.headcount || p.count || 1;

              {trackErr && <div style={{color:'#ff8aa0',fontSize:'13.5px',marginTop:'14px'}}>{trackErr}</div>}
              {trackNotFound && <div style={{color:'rgba(255,255,255,.7)',fontSize:'14px',marginTop:'18px'}}>{L.trackNotFound}</div>}

                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'10px',marginBottom:'20px'}}>

                      <div style={{color:'#fff',fontSize:'18px',fontWeight:'700'}}>{trackResult.name}</div>
                      <div style={{color:'rgba(255,255,255,.5)',fontSize:'13px',marginTop:'3px'}}>{trackResult.id}</div>
                    </div>
                    <span style={statusBadgeStyle(trackResult.status)}>{trackResult.status}</span>
                  </div>
                  <div data-r="trackgrid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>

                    <div><div style={{color:'rgba(255,255,255,.5)',fontSize:'11.5px',marginBottom:'3px'}}>{L.entityWord}</div><div style={{color:'#fff',fontSize:'13.5px',fontWeight:'600'}}>{trackResult.entity}</div></div>
                    <div><div style={{color:'rgba(255,255,255,.5)',fontSize:'11.5px',marginBottom:'3px'}}>{L.appliedOn}</div><div style={{color:'#fff',fontSize:'13.5px',fontWeight:'600'}}>{trackResult.submittedDate ? new Date(trackResult.submittedDate).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—'}</div></div>
                    <div><div style={{color:'rgba(255,255,255,.5)',fontSize:'11.5px',marginBottom:'3px'}}>{L.interviewDate}</div><div style={{color:'#fff',fontSize:'13.5px',fontWeight:'600'}}>{trackResult.interviewDate ? new Date(trackResult.interviewDate).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—'}</div></div>
                  </div>
                  <div style={{marginTop:'22px',paddingTop:'18px',borderTop:'1px solid rgba(255,255,255,.1)'}}>
                    <div style={{color:'rgba(255,255,255,.5)',fontSize:'11.5px',marginBottom:'14px'}}>{L.progressLabel}</div>
                    <div style={{display:'flex',alignItems:'flex-start'}}>
                      {timelineNodes.map((n, i) => (
                        <React.Fragment key={i}>
                          {n.isDot && (
                            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'7px',flex:'0 0 auto',width:'64px'}}>
                              <div style={{width:'30px',height:'30px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12.5px',fontWeight:'700',background:n.dotBg,color:n.dotColor}}>{n.dotText}</div>
                              <div style={{fontSize:'10px',textAlign:'center',lineHeight:'1.3',color:n.labelColor,fontWeight:n.labelWeight}}>{n.labelText}</div>
                            </div>

                  </div>

            </div>
          </div>
        </section>

        {/* BULK CV DROP */}
        <section style={{maxWidth:'1240px',margin:'0 auto',padding:'clamp(30px,4vw,56px) clamp(16px,4vw,48px)'}}>

            <p style={{marginTop:'8px',fontSize:'14.5px',color:'#6b6670'}}>{L.whySub}</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'18px'}}>
            {[
              { title: L.why2Title, desc: L.why2Desc },

              { title: L.whyHealthcareLeader, desc: L.whyHealthcareDesc },

              <div key={i} className="hf-why-card" style={{padding:'28px 24px',borderRadius:'24px',background:'rgba(255,255,255,.6)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',border:'1px solid rgba(255,255,255,.78)',boxShadow:'0 12px 34px rgba(110,11,42,.09)',transition:'transform .25s,box-shadow .25s'}}>

                <div style={{fontSize:'13px',color:'#6b6670',lineHeight:'1.55'}}>{card.desc}</div>
              </div>
            ))}
          </div>
        </section>

            <p style={{marginTop:'8px',fontSize:'14px',color:'#6b6670',maxWidth:'520px',marginLeft:'auto',marginRight:'auto',lineHeight:'1.6'}}>{L.bulkSub}</p>

            <input ref={bulkInputRef} type="file" multiple accept=".pdf,.doc,.docx,image/*" onChange={e => addBulk(e.target.files)} style={{display:'none'}} />
            <div style={{width:'70px',height:'70px',borderRadius:'22px',margin:'0 auto 16px',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#d6204a,#6e0b2a)',boxShadow:'0 12px 26px rgba(110,11,42,.3)'}}>

            <div style={{fontSize:'17px',fontWeight:'700',color:'#23202b',marginBottom:'6px'}}>{L.dropTitle}</div>
            <div style={{fontSize:'12.5px',color:'#9a949e'}}>{L.dropHint}</div>

            <div style={{display:'flex',flexDirection:'column',gap:'9px',marginTop:'16px'}}>

                const stStyle = f.status==='done'?{marginLeft:'8px',color:'#1e8449',fontWeight:'700',fontSize:'11px'}:f.status==='error'?{marginLeft:'8px',color:'#c0392b',fontWeight:'700',fontSize:'11px'}:f.status==='loading'?{marginLeft:'8px',color:'#b4123a',fontSize:'11px'}:{display:'none'};
                const stText = f.status==='done'?t('✓ Done','✓ تم'):f.status==='error'?t('✗ Failed','✗ فشل'):f.status==='loading'?t('Uploading…','جاري الرفع…'):'';
                return (
                  <div key={i} data-r="bulkrow" style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:'9px',alignItems:'center',padding:'12px 14px',borderRadius:'14px',background:'rgba(255,255,255,.62)',border:'1px solid rgba(255,255,255,.8)'}}>
                    <div style={{gridColumn:'1/-1',fontSize:'12.5px',fontWeight:'600',color:'#3a3640',display:'flex',alignItems:'center',gap:'8px'}}>

                      {f.fileName}<span style={stStyle}>{stText}</span>
                    </div>
                    <input value={f.name} onInput={e => setBulkField(i,'name',e.target.value)} disabled={f.status!=='idle'} required placeholder={`${L.candidateName} *`} style={{border:`1px solid ${!f.name?'rgba(214,32,74,.4)':'rgba(180,18,58,.16)'}`,borderRadius:'9px',padding:'9px 11px',fontFamily:'inherit',fontSize:'12.5px',outline:'none',background:'#fff',color:'#1c1b22'}} />
{f.status==='idle' ? (
                      <select value={f.position} onChange={e=>setBulkField(i,'position',e.target.value)}
                        style={{border:`1px solid ${!f.position?'rgba(214,32,74,.4)':'rgba(180,18,58,.16)'}`,borderRadius:'9px',padding:'9px 11px',fontFamily:'inherit',fontSize:'12.5px',outline:'none',background:'#fff',color:f.position?'#1c1b22':'#9a949e'}}>

                        {(masterPositions.length ? masterPositions : [...new Set(positions.map(p=>p.customPosition||p.position))].filter(Boolean)).map(p=><option key={p} value={p}>{p}</option>)}
                        <option value="__other__">{t('Other (type below)','أخرى (اكتب أدناه)')}</option>
                      </select>
                    ) : (
                      <div style={{fontSize:'12px',color:'#9a949e',padding:'9px 11px'}}>{f.position||'—'}</div>
                    )}
                    {f.status==='idle' && f.position==='__other__' && (
                      <input value={f.positionCustom||''} onInput={e=>setBulkField(i,'positionCustom',e.target.value)}
                        placeholder={t('Enter position title','أدخل المسمى الوظيفي')}
                        style={{border:'1px solid rgba(180,18,58,.16)',borderRadius:'9px',padding:'8px 11px',fontFamily:'inherit',fontSize:'12.5px',outline:'none',background:'#fff',color:'#1c1b22',marginTop:'4px'}}/>
                    )}
                    {f.status === 'idle' && (
                      <button onClick={() => removeBulk(i)} style={{width:'32px',height:'32px',borderRadius:'9px',border:'none',cursor:'pointer',background:'rgba(214,32,74,.1)',color:'#b4123a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px'}}>✕</button>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {bulkUploading && (
            <>
              <div style={{height:'6px',borderRadius:'99px',background:'rgba(28,27,34,.08)',overflow:'hidden',margin:'14px 0 8px'}}>

              </div>

            </>

          {bulkFiles.length > 0 && (
            <div style={{display:'flex',gap:'10px',flexWrap:'wrap',marginTop:'16px'}}>
              <button onClick={uploadAllBulk} disabled={bulkUploading} style={{padding:'13px 26px',borderRadius:'14px',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:'14px',fontWeight:'700',color:'#fff',background:'linear-gradient(135deg,#d6204a,#6e0b2a)',boxShadow:'0 10px 22px rgba(110,11,42,.28)'}}>{L.uploadAll}</button>
              <button onClick={() => bulkInputRef.current?.click()} style={{padding:'12px 22px',borderRadius:'14px',cursor:'pointer',fontFamily:'inherit',fontSize:'14px',fontWeight:'600',color:'#b4123a',background:'rgba(214,32,74,.08)',border:'1px solid rgba(180,18,58,.2)'}}>{L.addMore}</button>
            </div>
          )}

          {bulkDone && (
            <div style={{textAlign:'center',padding:'30px 0',marginTop:'16px'}}>
              <div style={{width:'56px',height:'56px',borderRadius:'50%',margin:'0 auto 14px',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#1e8449,#14663a)'}}>
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              </div>
              <div style={{fontSize:'18px',fontWeight:'800',color:'#1e8449',marginBottom:'6px'}}>{L.doneTitle}</div>
              <div style={{fontSize:'13px',color:'#6b6670'}}>{L.doneSub}</div>
            </div>
          )}
        </section>

        {/* FOOTER */}

        <section id="blog" style={{position:'relative',overflow:'hidden',background:'linear-gradient(135deg,#1a0a12 0%,#2a0d1e 40%,#1c0b16 100%)',padding:'clamp(50px,6vw,80px) clamp(16px,4vw,48px)',scrollMarginTop:'90px'}}>
          <div style={{position:'absolute',top:'-20%',right:'-10%',width:'55vw',height:'55vw',maxWidth:500,maxHeight:500,borderRadius:'50%',background:'radial-gradient(circle,rgba(180,18,58,.24),transparent 65%)',filter:'blur(30px)',animation:'hf-drift 26s ease-in-out infinite reverse',pointerEvents:'none'}}/>
          <div style={{position:'absolute',bottom:'-15%',left:'-5%',width:'45vw',height:'45vw',maxWidth:400,maxHeight:400,borderRadius:'50%',background:'radial-gradient(circle,rgba(110,11,42,.2),transparent 66%)',filter:'blur(26px)',animation:'hf-drift 32s ease-in-out infinite',pointerEvents:'none'}}/>
          <div style={{maxWidth:'1100px',margin:'0 auto',position:'relative',zIndex:1}}>
            <div style={{textAlign:'center',marginBottom:'40px'}}>
              <div style={{display:'inline-block',padding:'5px 16px',borderRadius:'99px',background:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.85)',fontSize:'11.5px',fontWeight:'800',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'14px'}}>{t('Latest','آخر الأخبار')}</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(28px,4vw,38px)',fontWeight:'700',color:'#fff',margin:'0 0 12px'}}>{t('News & Insights','أخبار ورؤى')}</h2>
              <p style={{fontSize:'14px',color:'rgba(255,255,255,.6)',margin:0}}>{t('Updates from HiFive Holdings — our growth, our people, our community.','تحديثات من هايفايف هولدينجز.')}</p>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'24px'}}>
              {newsItems.map((post,i)=>(
                <div key={i} style={{borderRadius:'18px',overflow:'hidden',border:'1px solid rgba(28,27,34,.07)',background:'#faf9f8',transition:'transform .2s,box-shadow .2s'}}
                  onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='0 16px 40px rgba(110,11,42,.1)';}}
                  onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='none';}}>
                  <div style={{height:'6px',background:'linear-gradient(90deg,#d6204a,#6e0b2a)'}}/>
                  <div style={{padding:'22px 24px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}}>
                      <span style={{padding:'3px 10px',borderRadius:'99px',background:'rgba(180,18,58,.1)',color:'#b4123a',fontSize:'10.5px',fontWeight:'700'}}>{post.tag}</span>
                      <span style={{fontSize:'11.5px',color:'#9a949e'}}>{post.date}</span>
                    </div>
                    <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'17px',fontWeight:'700',color:'#1c1b22',lineHeight:'1.4',marginBottom:'10px'}}>{post.title}</h3>
                    <p style={{fontSize:'13px',color:'#6b6670',lineHeight:'1.7',margin:'0 0 14px',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{post.body}</p>
                    <button onClick={()=>setNewsModal(post)} style={{fontSize:'12px',fontWeight:'700',color:'#b4123a',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:0,display:'flex',alignItems:'center',gap:'5px'}}>→ {t('Read more','اقرأ المزيد')}</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>

          <div style={{fontFamily:"'Playfair Display',serif",fontSize:'18px',color:'#fff',fontWeight:'600',letterSpacing:'.02em',marginBottom:'10px'}}>HiFive Holdings</div>
          <p style={{fontSize:'13px',color:'rgba(255,255,255,.5)',lineHeight:'1.7'}}>
            © 2026 HiFive Holdings LLC · Abu Dhabi, UAE<br/>
            <a href="mailto:hr@hifiveholdings.ae" style={{color:'rgba(255,255,255,.78)',textDecoration:'none'}}>hr@hifiveholdings.ae</a> &nbsp;·&nbsp; {L.footerNote}

            <p style={{fontSize:'11px',color:'rgba(255,255,255,.35)',lineHeight:'1.7',margin:0}}>
              {t(

              )}
            </p>
          </div>
        </footer>
      </div>

      {/* APPLY MODAL */}
      {/* News article popup */}
      {newsModal && (
        <div onClick={()=>setNewsModal(null)} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(28,27,34,.55)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:'24px',width:'100%',maxWidth:'660px',maxHeight:'82vh',display:'flex',flexDirection:'column',boxShadow:'0 30px 80px rgba(28,27,34,.3)'}}>
            <div style={{padding:'22px 26px',borderBottom:'1px solid rgba(28,27,34,.08)',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'16px',flexShrink:0}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}>
                  <span style={{padding:'3px 10px',borderRadius:'99px',background:'rgba(180,18,58,.1)',color:'#b4123a',fontSize:'10.5px',fontWeight:'700'}}>{newsModal.tag}</span>

                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'20px',fontWeight:'700',color:'#23202b',margin:0,lineHeight:'1.3'}}>{newsModal.title}</h3>
              </div>
              <button onClick={()=>setNewsModal(null)} style={{width:'34px',height:'34px',borderRadius:'50%',border:'none',background:'rgba(28,27,34,.06)',cursor:'pointer',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b6670',flexShrink:0}}>✕</button>
            </div>
            {newsModal.imageUrl && (
              <div style={{height:'200px',overflow:'hidden',flexShrink:0}}>
                <img src={newsModal.imageUrl} alt={newsModal.title} style={{width:'100%',height:'100%',objectFit:'cover'}}/>

      {/* JD popup */}
      {jdModal && (
        <div onClick={()=>setJdModal(null)} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(28,27,34,.55)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:'24px',width:'100%',maxWidth:'640px',maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'0 30px 80px rgba(28,27,34,.3)'}}>
            <div style={{padding:'22px 26px',borderBottom:'1px solid rgba(28,27,34,.08)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'20px',fontWeight:'700',color:'#23202b',margin:0}}>{jdModal.title}</h3>
              <button onClick={()=>setJdModal(null)} style={{width:'34px',height:'34px',borderRadius:'50%',border:'none',background:'rgba(28,27,34,.06)',cursor:'pointer',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center',color:'#6b6670'}}>✕</button>
            </div>
            <div style={{padding:'22px 26px',overflowY:'auto',fontSize:'14px',lineHeight:'1.8',color:'#3a3540'}} dangerouslySetInnerHTML={{__html:jdModal.body}}/>
            <div style={{padding:'16px 26px',borderTop:'1px solid rgba(28,27,34,.08)',flexShrink:0,display:'flex',justifyContent:'flex-end',gap:'10px'}}>
              <button onClick={()=>setJdModal(null)} style={{padding:'10px 20px',borderRadius:'12px',border:'1px solid rgba(28,27,34,.12)',background:'#f3eee8',color:'#6b6670',fontFamily:'inherit',fontSize:'13.5px',fontWeight:'600',cursor:'pointer'}}>{t('Close','إغلاق')}</button>
            </div>
          </div>
        </div>
      )}

      {modalOpen && (
        <div onClick={e => { if (e.target === e.currentTarget) closeModal(); }} style={{position:'fixed',inset:0,zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',background:'rgba(42,10,24,.5)',backdropFilter:'blur(6px)',WebkitBackdropFilter:'blur(6px)',animation:'hf-in .25s ease both',direction:dir}}>
          <div style={{width:'100%',maxWidth:'520px',maxHeight:'92vh',overflowY:'auto',borderRadius:'26px',padding:'clamp(26px,4vw,38px)',background:'rgba(255,255,255,.96)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',border:'1px solid rgba(255,255,255,.9)',boxShadow:'0 40px 90px rgba(110,11,42,.4)',animation:'hf-up .35s cubic-bezier(.2,.7,.2,1) both'}}>
            {success ? (
              <div style={{textAlign:'center',padding:'14px 0'}}>
                <div style={{width:'64px',height:'64px',borderRadius:'50%',margin:'0 auto 16px',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#1e8449,#14663a)',boxShadow:'0 12px 26px rgba(30,132,73,.34)'}}>
                  <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                </div>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'24px',fontWeight:'600',color:'#23202b',marginBottom:'8px'}}>{L.successTitle}</h3>
                <p style={{fontSize:'14px',color:'#3a3540',marginBottom:'6px'}}>{t('🎉 Application received! Your reference number:','🎉 تم استلام طلبك! رقم مرجعك:')}</p>
                <div style={{margin:'10px auto 10px',maxWidth:'260px',padding:'16px',borderRadius:'14px',background:'rgba(30,132,73,.12)',border:'1.5px solid rgba(30,132,73,.3)',color:'#1e8449',fontSize:'24px',fontWeight:'900',letterSpacing:'.14em',textAlign:'center'}}>{successRef}</div>
                <p style={{fontSize:'12.5px',color:'#6b6670',marginBottom:'4px'}}>{t('📸 Screenshot this number.','📸 خذ لقطة شاشة لهذا الرقم.')}</p>
                <p style={{fontSize:'12.5px',color:'#6b6670',marginBottom:'18px'}}>{t('Use it in Track Your Application to check your status.','استخدمه في تتبع طلبك للتحقق من حالتك.')}</p>
                <button onClick={closeModal} style={{padding:'13px 30px',borderRadius:'14px',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:'14px',fontWeight:'700',color:'#fff',background:'linear-gradient(135deg,#d6204a,#6e0b2a)'}}>{L.closeBtn}</button>
              </div>
            ) : (
              <div>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'23px',fontWeight:'600',color:'#23202b',lineHeight:'1.2'}}>{t('Apply — ','تقدم لوظيفة — ')}{modalPosition}</h3>
                <p style={{fontSize:'13px',color:'#6b6670',margin:'8px 0 14px',lineHeight:'1.55'}}>{L.modalSubtitle}</p>
                {modalJD && <div style={{maxHeight:'130px',overflowY:'auto',padding:'10px 12px',borderRadius:'10px',background:'#f9f5f1',border:'1px solid rgba(180,18,58,.1)',fontSize:'12px',lineHeight:'1.7',color:'#3a3540',marginBottom:'14px'}} dangerouslySetInnerHTML={{__html:modalJD}}/>}
                <div style={{display:'flex',flexDirection:'column',gap:'13px'}}>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    <label style={{fontSize:'12.5px',fontWeight:'600',color:'#4a4751'}}>{L.fullName}</label>
                    <input value={formName} onInput={e => setFormName(e.target.value)} placeholder="As per passport" style={{border:'1px solid rgba(180,18,58,.18)',borderRadius:'11px',padding:'12px 14px',fontFamily:'inherit',fontSize:'14px',outline:'none',background:'#fff',color:'#1c1b22'}} />
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    <label style={{fontSize:'12.5px',fontWeight:'600',color:'#4a4751'}}>{L.phone} *</label>
                    <input value={formPhone} onInput={e => setFormPhone(e.target.value)} placeholder="971XXXXXXXXX" style={{border:'1px solid rgba(180,18,58,.18)',borderRadius:'11px',padding:'12px 14px',fontFamily:'inherit',fontSize:'14px',outline:'none',background:'#fff',color:'#1c1b22'}} />
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    <label style={{fontSize:'12.5px',fontWeight:'600',color:'#4a4751'}}>{L.email}</label>
                    <input value={formEmail} onInput={e => setFormEmail(e.target.value)} type="email" style={{border:'1px solid rgba(180,18,58,.18)',borderRadius:'11px',padding:'12px 14px',fontFamily:'inherit',fontSize:'14px',outline:'none',background:'#fff',color:'#1c1b22'}} />
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    <label style={{fontSize:'12.5px',fontWeight:'600',color:'#4a4751'}}>{L.cvLabel}</label>
                    <input ref={cvRef} type="file" accept=".pdf,.doc,.docx" style={{border:'1px solid rgba(180,18,58,.18)',borderRadius:'11px',padding:'11px 12px',fontFamily:'inherit',fontSize:'12.5px',outline:'none',background:'#fff',color:'#6b6670'}} />
                  </div>
                </div>
                <div style={{display:'flex',gap:'10px',marginTop:'22px'}}>
                  <button onClick={submitApplication} disabled={submitting} style={{flex:'1',padding:'14px',borderRadius:'13px',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:'14px',fontWeight:'700',color:'#fff',background:'linear-gradient(135deg,#d6204a,#6e0b2a)',boxShadow:'0 10px 22px rgba(110,11,42,.28)'}}>{submitting ? t('Submitting…','جاري الإرسال…') : t('Submit Application','تقديم الطلب')}</button>
                  <button onClick={closeModal} style={{padding:'14px 22px',borderRadius:'13px',cursor:'pointer',fontFamily:'inherit',fontSize:'14px',fontWeight:'600',color:'#6b6670',background:'#f3eee8',border:'1px solid rgba(28,27,34,.08)'}}>{L.cancelBtn}</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {showBackTop && (
        <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="hf-btt-btn"
          style={{position:'fixed',bottom:'clamp(80px,12vw,100px)',right:'clamp(16px,3vw,28px)',zIndex:80}}>
          <svg className="arrow" width="16" height="16" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7" stroke="white" strokeWidth="2.5" strokeLinecap="round" fill="none"/></svg>
          <span className="hf-btt-text">Back to top</span>
        </button>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CareersPage />);
</script>
</body>
</html>
