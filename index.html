<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Careers — HiFive Holdings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#efe9e1;color:#1c1b22;font-family:"Inter",sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    ::selection{background:#b4123a;color:#fff}
    #root{min-height:100vh}

    @keyframes hf-drift{0%{transform:translate(0,0) scale(1)}33%{transform:translate(38px,-30px) scale(1.12)}66%{transform:translate(-28px,22px) scale(.94)}100%{transform:translate(0,0) scale(1)}}
    @keyframes hf-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
    @keyframes hf-float2{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
    @keyframes hf-up{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
    @keyframes hf-in{from{opacity:0}to{opacity:1}}
    @keyframes hf-blurin{from{opacity:0;filter:blur(14px);transform:translateY(14px)}to{opacity:1;filter:blur(0);transform:translateY(0)}}
    @keyframes hf-spin{to{transform:rotate(360deg)}}

    @media(max-width:820px){
      [data-r="rail"]{display:none!important}
      [data-r="hpad"]{padding-left:clamp(20px,5vw,30px)!important;padding-right:clamp(20px,5vw,30px)!important}
      [data-r="cpad"]{padding-left:clamp(20px,5vw,30px)!important;padding-right:clamp(20px,5vw,30px)!important}
    }
    @media(max-width:600px){
      [data-r="navsub"]{display:none!important}
      [data-r="navbtns"]{gap:4px!important}
      [data-r="navbtns"] button{font-size:12px!important;padding:8px 11px!important}
      [data-r="filterbar"]{border-radius:22px!important;padding:8px!important}
      [data-r="hero-h1"]{font-size:clamp(40px,12vw,56px)!important}
      [data-r="bulkrow"]{grid-template-columns:1fr!important}
      [data-r="trackgrid"]{grid-template-columns:1fr!important}
    }
    @media(max-width:400px){
      [data-r="navname"]{display:none!important}
    }

    .hf-nav-btn:hover{background:rgba(180,18,58,.08)!important;color:#b4123a!important}
    .hf-lang-btn:hover{transform:translateY(-1px)!important}
    .hf-cta-primary:hover{transform:translateY(-2px)!important;box-shadow:0 18px 36px rgba(110,11,42,.4)!important}
    .hf-cta-secondary:hover{background:#fff!important}
    .hf-filter-btn:hover{transform:translateY(-1px)!important}
    .hf-icon-btn:hover{background:rgba(255,255,255,.7)!important;color:#b4123a!important}
    .hf-stat-btn:hover{transform:rotate(-12deg) scale(1.05)!important}
    .hf-featured-apply:hover{background:#b4123a!important;color:#fff!important}
    .hf-apply-btn:hover{transform:translateY(-1px)!important}
    .hf-why-card:hover{transform:translateY(-4px)!important;box-shadow:0 22px 50px rgba(110,11,42,.16)!important}
    .hf-track-btn:hover{transform:translateY(-1px)!important}
    .hf-bulk-zone:hover{border-color:#b4123a!important;background:rgba(255,255,255,.72)!important}
    .hf-pos-card-open:hover{transform:translateY(-3px)!important;box-shadow:0 20px 48px rgba(110,11,42,.14)!important}
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js" crossorigin></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const WORKER = "https://recruitment.sinusuresh.workers.dev";

const FALLBACK = [
  { entity:'APML', branch:'Hamdan St', position:'Senior Medical Laboratory Technologist', experienceRequired:'3-5 yrs', expectedJoining:'2026-02-01', filled:1, headcount:3 },
  { entity:'Pine Pharmacy', branch:'Dubai', position:'Registered Pharmacist', experienceRequired:'2+ yrs', genderPreference:'None', filled:0, headcount:2 },
  { entity:'Al Jebal Opticals', branch:'Fujairah', position:'Optometrist', experienceRequired:'2-4 yrs', filled:0, headcount:1 },
  { entity:'Herbal Park', branch:'Abu Dhabi', position:'Ayurveda Therapist', experienceRequired:'1-3 yrs', filled:2, headcount:2 },
  { entity:'Atomic Drugstore', branch:'RAK', position:'Retail Supervisor', experienceRequired:'3+ yrs', expectedJoining:'2026-03-15', filled:0, headcount:1 },
  { entity:'APML', branch:'Abu Dhabi', position:'Phlebotomist (Home Collection)', experienceRequired:'1+ yr', filled:1, headcount:4 },
];

function CareersPage() {
  const [lang, setLang] = useState('en');
  const [positions, setPositions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [entity, setEntity] = useState('');
  const [statCount, setStatCount] = useState(0);
  const [modalOpen, setModalOpen] = useState(false);
  const [modalPosition, setModalPosition] = useState('');
  const [modalEntity, setModalEntity] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [success, setSuccess] = useState(false);
  const [successRef, setSuccessRef] = useState('');
  const [formName, setFormName] = useState('');
  const [formPhone, setFormPhone] = useState('');
  const [formEmail, setFormEmail] = useState('');
  const [formNat, setFormNat] = useState('');
  const [formSalary, setFormSalary] = useState('');
  const [trackInput, setTrackInput] = useState('');
  const [trackLoading, setTrackLoading] = useState(false);
  const [trackErr, setTrackErr] = useState('');
  const [trackResult, setTrackResult] = useState(null);
  const [trackNotFound, setTrackNotFound] = useState(false);
  const [bulkFiles, setBulkFiles] = useState([]);
  const [bulkUploading, setBulkUploading] = useState(false);
  const [bulkDone, setBulkDone] = useState(false);
  const [bulkProgress, setBulkProgress] = useState(0);
  const [bulkStatus, setBulkStatus] = useState('');

  const cvRef = useRef(null);
  const bulkInputRef = useRef(null);

  const ar = lang === 'ar';
  const dir = ar ? 'rtl' : 'ltr';
  const t = (en, a) => ar ? a : en;

  const L = {
    navSub: t('Healthcare & Retail Group','مجموعة الرعاية والتجزئة'),
    navPositions: t('Open Positions','الوظائف'),
    navTrack: t('Track Application','تتبع طلبك'),
    langLabel: ar ? 'English' : 'عربي',
    heroEyebrow: t('Now Hiring · 5 Units','نوظف الآن · 5 وحدات'),
    heroTitle1: t('Build Your','ابنِ'),
    heroTitle2: t('Career','مسيرتك'),
    heroSub: t('Join a growing healthcare & retail group across Abu Dhabi, Dubai, Fujairah and beyond. We invest in people who care.','انضم إلى مجموعة متنامية في الرعاية الصحية والتجزئة عبر أبوظبي ودبي والفجيرة وما هو أبعد. نستثمر في من يهتمون.'),
    heroCtaPrimary: t('View Open Positions','عرض الوظائف'),
    heroCtaSecondary: t('Track My Application','تتبع طلبي'),
    uploadHint: t('Recommended: 1040 × 1280 px · PNG · portrait','يُفضّل: 1040 × 1280 بكسل · PNG · عمودي'),
    allEntities: t('All Entities','جميع الجهات'),
    findBtn: t('Find Roles','ابحث'),
    searchPlaceholder: t('Search a role…','ابحث عن وظيفة…'),
    statCardTitle: t('Find The Right Place','اعثر على مكانك'),
    statCardDesc: t('We connect you with meaningful roles across our growing group.','نربطك بوظائف ذات معنى عبر مجموعتنا المتنامية.'),
    statTeam: t('Professionals','محترفون'),
    featuredLabel: t('Featured Opening','وظيفة مميزة'),
    uaeFullTime: t('UAE · Full Time','الإمارات · دوام كامل'),
    applyWord: t('Apply Now','تقدم الآن'),
    entitiesLabel: t('Our Business Units','وحدات أعمالنا'),
    posTitle: t('Open Positions','الوظائف المتاحة'),
    posSub: t('Live openings, updated in real time','وظائف شاغرة تُحدَّث في الوقت الفعلي'),
    loadingText: t('Loading positions…','جاري تحميل الوظائف…'),
    errorText: t('Unable to load positions right now.','تعذر تحميل الوظائف حالياً.'),
    emptyText: t('No positions match your filters.','لا توجد وظائف تطابق معاييرك.'),
    whyTitle: t('Why Join HiFive?','لماذا تنضم إلى هايفايف؟'),
    whySub: t('We grow together','ننمو معاً'),
    why1Title: t('Healthcare Leader','رائد في الرعاية'),
    why1Desc: t('ISO 15189:2022 accredited laboratory and DOH-licensed clinics.','مختبر معتمد وعيادات مرخصة من دائرة الصحة.'),
    why2Title: t('UAE-Wide Operations','عمليات في الإمارات'),
    why2Desc: t('Branches across Abu Dhabi, Dubai, RAK and Fujairah.','فروع عبر أبوظبي ودبي ورأس الخيمة والفجيرة.'),
    why3Title: t('Growth Culture','ثقافة النمو'),
    why3Desc: t('Training, certifications and clear career progression.','تدريب وشهادات ومسارات ترقٍّ واضحة.'),
    why4Title: t('Diverse Team','فريق متنوع'),
    why4Desc: t('160+ professionals from 20+ nationalities.','أكثر من 160 محترفاً من أكثر من 20 جنسية.'),
    trackTitle: t('Track Your Application','تتبع طلبك'),
    trackSub: t('Enter the reference ID you received after submitting your CV to check your current status.','أدخل رقم المرجع الذي تلقيته بعد تقديم سيرتك الذاتية للتحقق من حالتك.'),
    trackBtn: t('Track','تتبع'),
    trackNotFound: t('No application found with this ID. Please check and try again.','لم يتم العثور على طلب بهذا الرقم. يرجى التحقق والمحاولة مرة أخرى.'),
    posWord: t('Position','الوظيفة'),
    entityWord: t('Entity','الجهة'),
    appliedOn: t('Applied On','تاريخ التقديم'),
    interviewDate: t('Interview Date','تاريخ المقابلة'),
    progressLabel: t('Application Progress','تقدم الطلب'),
    bulkTitle: t('Drop Your CV Directly','أرسل سيرتك مباشرة'),
    bulkSub: t('Upload one or multiple CVs — no account needed. Files are saved securely and HR is notified instantly.','ارفع سيرة ذاتية أو أكثر — بدون حساب. تُحفظ الملفات بأمان وتُخطر الموارد البشرية فوراً.'),
    dropTitle: t('Drop CVs here or click to browse','أسقط السير هنا أو انقر للتصفح'),
    dropHint: t('PDF · Word · Image · Multiple files supported','PDF · Word · صورة · ملفات متعددة'),
    candidateName: t('Candidate name *','اسم المرشح *'),
    positionOptional: t('Position (optional)','الوظيفة (اختياري)'),
    uploadAll: t('Upload All CVs','رفع جميع السير'),
    addMore: t('+ Add More','+ إضافة المزيد'),
    doneTitle: t('All CVs uploaded!','تم رفع جميع السير!'),
    doneSub: t('HR has been notified. You will be contacted if your profile matches.','تم إخطار الموارد البشرية. سنتواصل معك إذا تطابق ملفك.'),
    modalSubtitle: t('Submit your CV and basic details. Our HR team will reach out within 3–5 business days.','أرسل سيرتك وتفاصيلك الأساسية. سيتواصل فريقنا خلال 3-5 أيام عمل.'),
    fullName: t('Full Name *','الاسم الكامل *'),
    phone: t('Phone *','رقم الهاتف *'),
    email: t('Email *','البريد الإلكتروني *'),
    nationality: t('Nationality *','الجنسية *'),
    expSalary: t('Expected Salary (AED) *','الراتب المتوقع (درهم) *'),
    cvLabel: t('CV (PDF/DOC) *','السيرة الذاتية *'),
    cancelBtn: t('Cancel','إلغاء'),
    successTitle: t('Application Submitted!','تم تقديم طلبك!'),
    refLabel: t('Your reference number:','رقم مرجعك:'),
    saveIdNote: t('Save this ID to track your application status above.','احفظ هذا الرقم لتتبع حالة طلبك أعلاه.'),
    closeBtn: t('Close','إغلاق'),
    footerNote: t('All positions subject to UAE Labour Law and visa eligibility.','جميع الوظائف خاضعة لقانون العمل الإماراتي وأهلية التأشيرة.'),
  };

  useEffect(() => {
    fetch(`${WORKER}/get-open-positions`)
      .then(r => r.json())
      .then(d => {
        const arr = d.positions || [];
        setPositions(arr.length ? arr : FALLBACK);
        setLoading(false);
      })
      .catch(() => { setPositions(FALLBACK); setLoading(false); });
  }, []);

  useEffect(() => {
    const target = 160, dur = 1200, t0 = performance.now();
    let raf;
    const tick = (now) => {
      const k = Math.min(1, (now - t0) / dur);
      const eased = 1 - Math.pow(1 - k, 3);
      setStatCount(Math.round(target * eased));
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  const scrollToId = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
  };

  const fmtDate = (val) => {
    if (!val) return '';
    const s = String(val).trim();
    if (/^\d{2}-\d{2}-\d{4}$/.test(s)) return s;
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) { const [y,m,d] = s.split('T')[0].split('-'); return `${d}-${m}-${y}`; }
    const n = parseFloat(s);
    if (!isNaN(n) && n > 1000) { const dt = new Date(new Date(1899,11,30).getTime() + n*86400000); return `${String(dt.getDate()).padStart(2,'0')}-${String(dt.getMonth()+1).padStart(2,'0')}-${dt.getFullYear()}`; }
    return s;
  };

  const filteredPositions = useMemo(() => {
    const s = search.toLowerCase().trim();
    return positions.filter(p => {
      const pos = (p.customPosition || p.position || '').toLowerCase();
      return (!s || pos.includes(s)) && (!entity || p.entity === entity);
    });
  }, [positions, search, entity]);

  const posVM = (p) => {
    const filled = p.filled || 0;
    const total = p.headcount || p.count || 1;
    const pct = Math.min(100, Math.round((filled / total) * 100));
    const isFull = pct >= 100;
    const isAlmost = pct >= 50 && pct < 100;
    const barColor = isFull ? '#c0392b' : isAlmost ? '#d98a14' : '#1e8449';
    const labelColor = isFull ? '#c0392b' : isAlmost ? '#b8740f' : '#1a7a42';
    let meta = t('UAE · Full Time','الإمارات · دوام كامل');
    if (p.experienceRequired) meta += ` · ${p.experienceRequired}`;
    if (p.genderPreference && p.genderPreference !== 'None') meta += ` · ${p.genderPreference} ${t('preferred','مفضل')}`;
    return {
      title: p.customPosition || p.position,
      entityLine: p.entity + (p.branch ? ` · ${p.branch}` : ''),
      metaLine: meta,
      hasJoining: !!p.expectedJoining,
      joiningLine: p.expectedJoining ? `${t('Target joining','الالتحاق')}: ${fmtDate(p.expectedJoining)}` : '',
      pct, isFull, isOpen: !isFull,
      barColor,
      fillLabel: isFull ? t('Position Filled','تم الشغل') : `${total - filled} ${t('of','من')} ${total} ${t('open','متاح')}`,
      fillLabelStyle: { fontSize:'11.5px', fontWeight:'700', color:labelColor },
      badgeText: isFull ? t('Filled','مكتمل') : t('Hiring Now','نوظف الآن'),
      badgeFull: isFull,
      locWord: t('UAE','الإمارات'),
      applyText: isFull ? t('No vacancies','لا شواغر') : t('Apply','تقدم'),
      onApply: () => openApply(p.position, p.entity),
    };
  };

  const allVMs = useMemo(() => positions.map(posVM), [positions, lang]);
  const featured = useMemo(() => {
    const open = allVMs.find(v => v.isOpen) || allVMs[0] || {
      title: t('Multiple Openings','وظائف متعددة'), entityLine: 'HiFive Holdings',
      metaTag: t('Across 5 units','عبر 5 وحدات'), onApply: () => scrollToId('positions'),
    };
    if (open) {
      const parts = (open.metaLine || '').split(' · ');
      const expLabel = parts.slice(2).find(p => /yr|year|exp/i.test(p)) || parts.slice(2).join(' · ');
      const branchParts = (open.entityLine || '').split(' · ');
      const branch = branchParts.length > 1 ? branchParts.slice(1).join(' · ') : '';
      open.metaTag = expLabel || branch || open.fillLabel || t('Open now','متاح الآن');
    }
    return open;
  }, [allVMs, lang]);

  const openApply = (position, ent) => {
    setModalOpen(true); setModalPosition(position); setModalEntity(ent);
    setSuccess(false); setFormName(''); setFormPhone(''); setFormEmail(''); setFormNat(''); setFormSalary('');
  };
  const closeModal = () => { setModalOpen(false); setSuccess(false); };

  const submitApplication = async () => {
    const cvFile = cvRef.current?.files?.[0];
    if (!formName || !formPhone || !formEmail || !formNat || !formSalary || !cvFile) {
      alert(t('Please fill in all required fields and attach your CV.','يرجى ملء جميع الحقول المطلوبة وإرفاق سيرتك الذاتية.'));
      return;
    }
    setSubmitting(true);
    try {
      const res = await fetch(`${WORKER}/add-candidate`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:formName, phone:formPhone, email:formEmail, nationality:formNat,
          expectedSalary:formSalary, position:modalPosition, entity:modalEntity, source:'Careers Page', role:'recruiter' }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Submission failed');
      const candID = data.candidateID;
      const fd = new FormData();
      fd.append('candidateID', candID);
      fd.append('file', cvFile);
      await fetch(`${WORKER}/upload-cv-public`, { method:'POST', body:fd });
      setSuccess(true); setSuccessRef(candID);
    } catch (e) {
      alert(t('Submission failed: ','فشل الإرسال: ') + e.message);
    } finally { setSubmitting(false); }
  };

  const STATUS_STEPS = ['Active','Shortlisted','Ops Cleared','Mgmt Cleared','Offered','Accepted','Joined'];
  const statusLabel = (s) => {
    const en = { Active:'Applied', Shortlisted:'Shortlisted', 'Ops Cleared':'Ops Cleared',
      'Mgmt Cleared':'Mgmt Cleared', Offered:'Offer Extended', Accepted:'Offer Accepted', Joined:'Joined' };
    const ara = { Active:'تم التقديم', Shortlisted:'القائمة المختصرة', 'Ops Cleared':'اجتاز العمليات',
      'Mgmt Cleared':'اجتاز الإدارة', Offered:'تم إرسال العرض', Accepted:'قبل العرض', Joined:'التحق' };
    return (ar ? ara : en)[s] || s;
  };
  const statusBadgeStyle = (status) => {
    const m = {
      Active:{bg:'rgba(43,108,176,.18)',color:'#cfe6ff'}, Shortlisted:{bg:'rgba(216,138,20,.22)',color:'#ffd9a0'},
      Offered:{bg:'rgba(214,32,74,.24)',color:'#ffc2cf'}, Joined:{bg:'rgba(30,132,73,.24)',color:'#b8f0cf'},
      Rejected:{bg:'rgba(192,57,43,.24)',color:'#ffc2bb'}, 'On Hold':{bg:'rgba(108,52,131,.24)',color:'#e6c8f0'}, Onboarding:{bg:'rgba(30,100,200,.24)',color:'#c2d6ff'}, Accepted:{bg:'rgba(30,132,73,.24)',color:'#b8f0cf'}, 'Ops Cleared':{bg:'rgba(14,165,233,.24)',color:'#bae6fd'}, 'Mgmt Cleared':{bg:'rgba(16,185,129,.24)',color:'#a7f3d0'}, 'Verbal Offered':{bg:'rgba(249,115,22,.24)',color:'#fed7aa'},
    };
    const {bg='rgba(255,255,255,.15)',color='#fff'} = m[status] || {};
    return { fontSize:'12.5px', fontWeight:'700', padding:'6px 15px', borderRadius:'99px', background:bg, color };
  };
  const buildTimeline = (status) => {
    const cur = STATUS_STEPS.indexOf(status);
    const nodes = [];
    STATUS_STEPS.forEach((s, i) => {
      const done = i < cur, current = i === cur;
      const dotBg = done ? '#1e8449' : current ? 'linear-gradient(135deg,#d6204a,#6e0b2a)' : 'rgba(255,255,255,.14)';
      const dotColor = (done || current) ? '#fff' : 'rgba(255,255,255,.45)';
      nodes.push({ isDot:true, isLine:false, dotText: done ? '✓' : String(i+1),
        dotBg, dotColor, labelText: statusLabel(s),
        labelColor: current?'#ff9fb2':done?'rgba(255,255,255,.7)':'rgba(255,255,255,.4)',
        labelWeight: current?'700':'500' });
      if (i < STATUS_STEPS.length-1) nodes.push({ isDot:false, isLine:true, lineBg: done?'#1e8449':'rgba(255,255,255,.14)' });
    });
    return nodes;
  };

  const onTrackKey = (e) => { if (e.key === 'Enter') doTrack(); };
  const doTrack = async () => {
    const id = trackInput.trim().toUpperCase();
    setTrackErr(''); setTrackResult(null); setTrackNotFound(false);
    if (!/^REC-\d{4}$/.test(id)) { setTrackErr(t('Please enter a valid reference ID (e.g. REC-0001)','يرجى إدخال رقم مرجع صحيح (مثال: REC-0001)')); return; }
    setTrackLoading(true);
    try {
      const r = await fetch(`${WORKER}/track-status?id=${id}`);
      const data = await r.json();
      if (!data.found) { setTrackNotFound(true); return; }
      setTrackResult(data);
    } catch (e) { setTrackErr(t('Error checking status. Please try again.','خطأ في التحقق من الحالة. يرجى المحاولة مرة أخرى.')); }
    finally { setTrackLoading(false); }
  };

  const guessName = (fn) => fn.replace(/\.(pdf|doc|docx|jpg|jpeg|png)$/i,'').replace(/[_\-.]+/g,' ')
    .replace(/\b(cv|resume|application)\b/gi,'').trim()
    .split(/\s+/).map(w => w ? w[0].toUpperCase()+w.slice(1).toLowerCase() : '').join(' ').trim();

  const addBulk = (fileList) => {
    const add = Array.from(fileList).map(f => ({ file:f, fileName:f.name, name:guessName(f.name), position:'', status:'idle' }));
    setBulkFiles(prev => [...prev, ...add]);
    setBulkDone(false);
  };

        const fd = new FormData();

        if (!data.success) throw new Error(data.error||'fail');
        setBulkField(i, 'status', 'done'); done++;
      } catch { setBulkField(i, 'status', 'error'); }
      setBulkProgress(Math.round((done/pending.length)*100));
      setBulkStatus(`${t('Uploaded','تم رفع')} ${done} ${t('of','من')} ${pending.length}…`);
    }
    setBulkUploading(false);
    setBulkFiles(prev => { if (prev.every(f=>f.status==='done') && prev.length) { setBulkDone(true); return []; } return prev; });

                    <input value={f.position} onInput={e => setBulkField(i,'position',e.target.value)} disabled={f.status!=='idle'} placeholder={L.positionOptional} style={{border:'1px solid rgba(180,18,58,.16)',borderRadius:'9px',padding:'9px 11px',fontFamily:'inherit',fontSize:'12.5px',outline:'none',background:'#fff',color:'#1c1b22'}} />

              </div>
              <div style={{fontSize:'12.5px',color:'#6b6670',textAlign:'center'}}>{bulkStatus}</div>

                  <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>

                <p style={{fontSize:'12.5px',color:'#9a949e',marginBottom:'18px'}}>{L.saveIdNote}</p>
                <button onClick={closeModal} style={{padding:'13px 30px',borderRadius:'14px',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:'14px',fontWeight:'700',color:'#fff',background:'linear-gradient(135deg,#d6204a,#6e0b2a)'}}>{L.closeBtn}</button>

                      <input value={formNat} onInput={e => setFormNat(e.target.value)} style={{border:'1px solid rgba(180,18,58,.18)',borderRadius:'11px',padding:'12px 14px',fontFamily:'inherit',fontSize:'14px',outline:'none',background:'#fff',color:'#1c1b22'}} />
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    <label style={{fontSize:'12.5px',fontWeight:'600',color:'#4a4751'}}>{L.email}</label>
                    <input value={formEmail} onInput={e => setFormEmail(e.target.value)} type="email" style={{border:'1px solid rgba(180,18,58,.18)',borderRadius:'11px',padding:'12px 14px',fontFamily:'inherit',fontSize:'14px',outline:'none',background:'#fff',color:'#1c1b22'}} />
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    <label style={{fontSize:'12.5px',fontWeight:'600',color:'#4a4751'}}>{L.expSalary}</label>
                    <input value={formSalary} onInput={e => setFormSalary(e.target.value)} type="number" style={{border:'1px solid rgba(180,18,58,.18)',borderRadius:'11px',padding:'12px 14px',fontFamily:'inherit',fontSize:'14px',outline:'none',background:'#fff',color:'#1c1b22'}} />
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    <label style={{fontSize:'12.5px',fontWeight:'600',color:'#4a4751'}}>{L.cvLabel}</label>
                    <input ref={cvRef} type="file" accept=".pdf,.doc,.docx" style={{border:'1px solid rgba(180,18,58,.18)',borderRadius:'11px',padding:'11px 12px',fontFamily:'inherit',fontSize:'12.5px',outline:'none',background:'#fff',color:'#6b6670'}} />
                  </div>
                </div>
                <div style={{display:'flex',gap:'10px',marginTop:'22px'}}>
                  <button onClick={submitApplication} disabled={submitting} style={{flex:'1',padding:'14px',borderRadius:'13px',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:'14px',fontWeight:'700',color:'#fff',background:'linear-gradient(135deg,#d6204a,#6e0b2a)',boxShadow:'0 10px 22px rgba(110,11,42,.28)'}}>{submitting ? t('Submitting…','جاري الإرسال…') : t('Submit Application','تقديم الطلب')}</button>
                  <button onClick={closeModal} style={{padding:'14px 22px',borderRadius:'13px',cursor:'pointer',fontFamily:'inherit',fontSize:'14px',fontWeight:'600',color:'#6b6670',background:'#f3eee8',border:'1px solid rgba(28,27,34,.08)'}}>{L.cancelBtn}</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CareersPage />);
</script>
</body>
</html>
