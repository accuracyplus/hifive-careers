<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HiFive Holdings Careers</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Inter",sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;background:#efe9e1;color:#1c1b22;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
img{max-width:100%}

:root{
  --bg:#efe9e1; --ink:#1c1b22; --ink2:#5b5560; --muted:#8a8590;
  --line:rgba(28,27,34,.08); --card:rgba(255,255,255,.88); --card2:rgba(255,255,255,.6); --cb:rgba(255,255,255,.8);
  --acc:#d6204a; --acc2:#6e0b2a; --grad:linear-gradient(135deg,#d6204a,#6e0b2a);
  --soft:rgba(214,32,74,.08); --soft2:rgba(214,32,74,.16);
  --glow:rgba(110,11,42,.30); --glowS:rgba(110,11,42,.14);
}

@keyframes drift{0%{transform:translate(0,0) scale(1)}33%{transform:translate(38px,-30px) scale(1.12)}66%{transform:translate(-28px,22px) scale(.94)}100%{transform:translate(0,0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.loader{width:40px;aspect-ratio:1;--c:linear-gradient(#000 0 0);--m:radial-gradient(farthest-side,#000 90%,#0000);background:var(--c),var(--m),var(--c);background-size:16px 8px,10px 10px;background-repeat:no-repeat;animation:l19-1 .5s infinite alternate,l19-2 4s infinite linear .5s;}
@keyframes l19-1{0%,10%{background-position:calc(50% - 8px) 50%,50% 10%,calc(50% + 8px) 50%}80%,100%{background-position:-20px 50%,50% 50%,calc(100% + 20px) 50%}}
@keyframes l19-2{0%,24.99%{transform:rotate(0)}25%,49.99%{transform:rotate(90deg)}50%,74.99%{transform:rotate(180deg)}75%,100%{transform:rotate(270deg)}}
.loader-maroon{--c:linear-gradient(var(--acc) 0 0);--m:radial-gradient(farthest-side,var(--acc) 90%,#0000)}
.loader-wrap{display:flex;align-items:center;justify-content:center;min-height:50vh;width:100%;grid-column:1/-1}

.nav{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:20px;padding:14px clamp(16px,4vw,48px);background:rgba(255,255,255,.62);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.6)}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-logo{width:38px;height:38px;border-radius:11px;background:var(--grad);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 16px var(--glow)}
.nav-logo span{font-family:"Playfair Display",serif;font-weight:700;font-size:20px;color:#fff;line-height:1}
.nav-name{font-weight:800;font-size:15px;letter-spacing:-.01em;color:#1c1b22}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-btn{border:none;background:none;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;color:#4a4751;padding:9px 14px;border-radius:99px;transition:all .2s}
.nav-btn:hover{background:var(--soft);color:var(--acc2)}
@media(max-width:640px){.nav-links{display:none}}

.hero{position:relative;padding:clamp(40px,6vw,80px) clamp(16px,4vw,48px) clamp(30px,5vw,60px);max-width:1320px;margin:0 auto}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(30px,5vw,60px);align-items:center}
@media(max-width:900px){.hero-grid{grid-template-columns:1fr}}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;padding:7px 16px;border-radius:99px;background:var(--soft);color:var(--acc2);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:20px}
.hero-h1{font-family:"Playfair Display",serif;font-weight:600;letter-spacing:-.02em;color:var(--ink);line-height:1.08;margin-bottom:18px}
.hero-h1 .line1{display:block;font-size:clamp(32px,4.6vw,50px)}
.hero-h1 .line2{display:block;font-size:clamp(26px,3.6vw,40px);color:var(--acc2);margin-top:4px}
.hero-sub{font-size:clamp(15px,1.6vw,17.5px);color:var(--ink2);line-height:1.65;max-width:520px;margin-bottom:30px}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:34px}
.cta-primary{display:inline-flex;align-items:center;gap:9px;padding:14px 26px;border-radius:99px;border:none;cursor:pointer;font-family:inherit;font-size:14.5px;font-weight:700;color:#fff;background:var(--grad);box-shadow:0 12px 26px var(--glow);transition:transform .2s,box-shadow .2s}
.cta-primary:hover{transform:translateY(-2px);box-shadow:0 16px 32px var(--glow)}
.cta-secondary{padding:14px 24px;border-radius:99px;cursor:pointer;font-family:inherit;font-size:14.5px;font-weight:600;color:#23202b;background:rgba(255,255,255,.55);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.8);transition:all .2s}
.cta-secondary:hover{background:rgba(255,255,255,.8)}
.hero-stats{display:flex;gap:28px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:12px}
.stat-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--grad);box-shadow:0 8px 18px var(--glow);flex-shrink:0}
.stat-val{font-family:"Playfair Display",serif;font-size:22px;font-weight:700;color:var(--ink);line-height:1}
.stat-label{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
.hero-img-wrap{position:relative;border-radius:26px;overflow:hidden}
.hero-img-wrap img{display:block;width:100%;height:100%;min-height:clamp(300px,38vw,460px);object-fit:cover;border-radius:26px;border:1px solid rgba(255,255,255,.7);box-shadow:0 22px 54px var(--glowS)}

.section{max-width:1240px;margin:0 auto;padding:clamp(40px,5vw,72px) clamp(16px,4vw,48px) clamp(30px,4vw,48px);scroll-margin-top:90px}
.section-head{text-align:center;margin-bottom:38px}
.section-eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc2);margin-bottom:10px}
.section-h2{font-family:"Playfair Display",serif;font-size:clamp(26px,3.6vw,40px);font-weight:600;letter-spacing:-.02em;color:#23202b}
.section-sub{font-size:14.5px;color:var(--ink2);max-width:580px;margin:10px auto 0}

.why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
@media(max-width:900px){.why-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.why-grid{grid-template-columns:1fr}}
.why-card{padding:26px 22px;border-radius:20px;background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--cb);box-shadow:0 12px 30px var(--glowS);transition:transform .25s,box-shadow .25s}
.why-card:hover{transform:translateY(-4px);box-shadow:0 20px 44px var(--glowS)}
.why-icon{width:46px;height:46px;border-radius:14px;background:var(--soft);color:var(--acc2);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.why-num{font-family:"Playfair Display",serif;font-weight:700;font-size:13px;color:var(--acc);margin-bottom:6px}
.why-card-title{font-size:15.5px;font-weight:700;color:var(--ink);margin-bottom:8px}
.why-card-desc{font-size:13px;color:var(--ink2);line-height:1.6}

.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:24px;padding:16px 18px;border-radius:18px;background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--cb);box-shadow:0 10px 26px var(--glowS)}
.filter-select{padding:10px 14px;border-radius:99px;border:1px solid var(--cb);background:#fff;font-family:inherit;font-size:13px;color:var(--ink);cursor:pointer}
.filter-search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:99px;border:1px solid var(--cb);background:#fff}
.filter-search input{border:none;outline:none;background:none;font-family:inherit;font-size:13px;flex:1;color:var(--ink)}

.positions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.position-card{padding:22px 22px 20px;border-radius:20px;background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--cb);border-left:4px solid var(--acc);box-shadow:0 12px 30px var(--glowS);transition:transform .25s,box-shadow .25s}
.position-card:hover{transform:translateY(-4px);box-shadow:0 20px 44px var(--glowS)}
.pos-entity{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--acc2);margin-bottom:6px}
.pos-title{font-family:"Playfair Display",serif;font-size:19px;font-weight:600;color:var(--ink);margin-bottom:8px;line-height:1.25}
.pos-meta{font-size:12.5px;color:var(--muted);margin-bottom:10px;line-height:1.6}
.pos-joining{font-size:12px;color:var(--acc2);margin-bottom:6px;font-weight:500}
.pos-fill{margin:12px 0 14px}
.pos-fill-bar{height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden;margin-bottom:5px}
.pos-fill-fill{height:100%;border-radius:3px;transition:width .6s ease}
.pos-fill-label{font-size:11px;font-weight:700}
.pos-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.pos-badge{display:inline-block;padding:5px 13px;border-radius:99px;font-size:11px;font-weight:700;background:var(--soft);color:var(--acc2)}
.pos-badge-full{background:rgba(207,53,82,.12);color:#cf3552}
.pos-apply{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:99px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;color:#fff;background:var(--grad);box-shadow:0 6px 16px var(--glow);transition:all .2s}
.pos-apply:hover{transform:translateY(-1px)}
.no-positions{text-align:center;padding:50px 20px;color:var(--muted);font-size:14px;grid-column:1/-1}

.cv-drop-section{padding:clamp(40px,5vw,64px) clamp(16px,4vw,48px);background:#fff}
.cv-drop-inner{max-width:780px;margin:0 auto}
.drop-zone{border:2px dashed rgba(214,32,74,.3);border-radius:22px;padding:clamp(36px,5vw,52px) 24px;text-align:center;cursor:pointer;transition:all .25s;background:#fdf9f7}
.drop-zone:hover{border-color:var(--acc);background:var(--soft)}
.drop-orb{width:72px;height:72px;border-radius:20px;background:var(--grad);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 26px var(--glow)}
.drop-title{font-family:"Playfair Display",serif;font-size:20px;font-weight:600;color:var(--ink);margin-bottom:6px}
.drop-sub{font-size:13px;color:var(--muted)}
.mandatory-fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
@media(max-width:560px){.mandatory-fields{grid-template-columns:1fr}}
.field-label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.field-select,.field-input{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--cb);background:#fff;font-family:inherit;font-size:13.5px;color:var(--ink);outline:none}
.field-select:focus,.field-input:focus{border-color:var(--acc)}
.field-req{color:#cf3552}
.file-list{display:flex;flex-direction:column;gap:8px;margin:18px 0}
.file-row{padding:12px 14px;border-radius:12px;background:#F4F1ED;border:1px solid var(--line);display:flex;align-items:center;gap:10px}
.file-row-name{flex:1;font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-rm{width:26px;height:26px;border-radius:8px;border:none;background:rgba(207,53,82,.1);color:#cf3552;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.upload-btn{margin-top:14px;width:100%;padding:14px;border-radius:14px;border:none;background:var(--grad);color:#fff;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;box-shadow:0 10px 24px var(--glow)}
.upload-btn:disabled{opacity:.6;cursor:not-allowed}
.error-msg{background:rgba(207,53,82,.08);color:#cf3552;border-radius:10px;padding:10px 14px;font-size:12.5px;font-weight:600;margin-bottom:14px}
.success-box{text-align:center;padding:24px 0}
.success-icon{width:64px;height:64px;border-radius:50%;background:#1f9d63;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 12px 26px rgba(31,157,99,.35)}

.tracker-card{max-width:560px;margin:0 auto;padding:28px;border-radius:22px;background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--cb);box-shadow:0 16px 38px var(--glowS)}
.tracker-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:480px){.tracker-fields{grid-template-columns:1fr}}
.tracker-btn{width:100%;padding:13px;border-radius:99px;border:none;background:var(--grad);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 10px 22px var(--glow)}
.status-result{margin-top:20px;padding:18px;border-radius:16px;background:var(--card2)}
.status-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.status-row:last-child{border-bottom:none}

.footer{margin-top:30px;padding:40px clamp(16px,4vw,48px) 30px;background:linear-gradient(160deg,#23202b,#1a0a12);text-align:center}
.footer-logo{height:40px;width:auto;margin:0 auto 16px;display:block;filter:brightness(0) invert(1)}
.footer-links{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-bottom:20px}
.footer-links a{font-size:12px;color:rgba(255,255,255,.65);transition:color .2s}
.footer-links a:hover{color:#fff}
.footer-divider{height:1px;background:rgba(255,255,255,.1);max-width:600px;margin:0 auto 18px}
.footer-disclaimer{font-size:10.5px;color:rgba(255,255,255,.4);max-width:680px;margin:0 auto;line-height:1.7}

.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(20px)}
.orb1{top:-120px;left:-80px;width:520px;height:520px;background:radial-gradient(circle at 30% 30%,rgba(214,32,74,.18),transparent 65%);animation:drift 22s ease-in-out infinite}
.orb2{top:30%;right:-140px;width:560px;height:560px;background:radial-gradient(circle,rgba(110,11,42,.14),transparent 66%);animation:drift 28s ease-in-out infinite reverse}
.orb3{bottom:-160px;left:25%;width:480px;height:480px;background:radial-gradient(circle,rgba(196,150,120,.15),transparent 66%);animation:drift 26s ease-in-out infinite}

.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(20,12,18,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .25s ease both}
.modal-box{width:100%;max-width:520px;max-height:88vh;overflow-y:auto;border-radius:22px;background:#fff;box-shadow:0 40px 90px -20px var(--glow)}
.modal-head{padding:22px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}
.modal-title{font-family:"Playfair Display",serif;font-size:19px;font-weight:600;color:var(--ink)}
.modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.modal-body{padding:22px 24px}

.toggle-lang{border:1px solid var(--cb);background:rgba(255,255,255,.6);border-radius:99px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink2)}

body.ar{direction:rtl}

.hidden{display:none!important}
</style>
</head>

function fmtDateDDMMYYYY(val) {
  if (!val) return '—';
  const s = String(val).trim();
  if (/^\d{2}-\d{2}-\d{4}$/.test(s)) return s;
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    const parts = s.split('T')[0].split('-');
    return parts[2] + '-' + parts[1] + '-' + parts[0];
  }
  const n = parseFloat(s);
  if (!isNaN(n) && n > 1000) {
    const dt = new Date(new Date(1899,11,30).getTime() + n*86400000);
    return String(dt.getDate()).padStart(2,'0') + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + dt.getFullYear();
  }
  return s;
}
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const k in (attrs||{})) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (attrs[k] !== null) e.setAttribute(k, attrs[k]);
  }
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}
function svgIcon(paths, size, color) {
  size = size || 18;
  const wrap = document.createElement('span');
  wrap.style.display = 'inline-flex';
  wrap.innerHTML = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+(color||'currentColor')+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+paths+'</svg>';
  return wrap;
}

      const hay = (p.position + ' ' + (p.customPosition||'') + ' ' + p.entity).toLowerCase();
      if (hay.indexOf(filterSearch.toLowerCase()) === -1) return false;
    }

  entitySelect.appendChild(el('option', { value: '' }, L().filterEntity));
  BUSINESS_UNITS.forEach(u => {

  const searchWrap = el('div', { class: 'filter-search' }, svgIcon('<circle cx="11" cy="11" r="8"/><path d="m20 20-3.2-3.2"/>', 15));

  if (!positionsLoaded) {
    section.appendChild(el('div', { class: 'loader-wrap' }, el('div', { class: 'loader loader-maroon' })));
    return section;

  if (!filtered.length) {
    section.appendChild(el('div', { class: 'no-positions' }, L().noPositions));

  const grid = el('div', { class: 'positions-grid' });
  filtered.forEach(p => {

      el('span', { class: 'pos-badge' + (isFull?' pos-badge-full':'') }, isFull ? L().badgeFull : L().badgeOpen)

  return section;

function buildCvForm(opts) {
  const wrap = el('div', { class: 'cv-form-wrap' });

  function draw() {
    wrap.innerHTML = '';

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.pdf,.doc,.docx,image/*';
    fileInput.style.display = 'none';
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) { selectedFile = e.target.files[0]; draw(); }
    });

    const dropZone = el('div', { class: 'drop-zone', onclick: () => fileInput.click() },
      el('div', { class: 'drop-orb' }, svgIcon('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>', 30, '#fff')),
      el('div', { class: 'drop-title' }, L().dropTitle),
      el('div', { class: 'drop-sub' }, L().dropSub)
    );
    dropZone.appendChild(fileInput);
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#d6204a'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'rgba(214,32,74,.3)'; });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = 'rgba(214,32,74,.3)';
      if (e.dataTransfer.files[0]) { selectedFile = e.dataTransfer.files[0]; draw(); }
    });
    wrap.appendChild(dropZone);

    if (selectedFile) {
      wrap.appendChild(el('div', { class: 'file-list' },
        el('div', { class: 'file-row' },
          svgIcon('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>', 16),
          el('span', { class: 'file-row-name' }, selectedFile.name),

        )
      ));

    });
    posSelect.appendChild(el('option', { value: '__other__' }, t('Other / Not Listed','أخرى / غير مدرجة')));
    posField.appendChild(posSelect);

      nameInput, posSelect, facSelect, phoneInput, emailInput, errorBox, wrap, draw,

    }));

async function submitCv(refs) {
  const nameInput = refs.nameInput, posSelect = refs.posSelect, facSelect = refs.facSelect;
  const phoneInput = refs.phoneInput, emailInput = refs.emailInput, errorBox = refs.errorBox, wrap = refs.wrap;
  const file = refs.getFile();
  const name = nameInput.value.trim();
  const position = posSelect.value === '__other__' ? 'Other' : posSelect.value;
  const facility = facSelect.value;
  const phone = phoneInput.value.trim();
  const email = emailInput.value.trim();

  errorBox.style.display = 'none';

  if (!file) { showCvError(errorBox, t('Please attach your CV.','يرجى إرفاق سيرتك الذاتية.')); return; }
  if (!name) { showCvError(errorBox, t('Please enter your full name.','يرجى إدخال اسمك الكامل.')); return; }
  if (!position) { showCvError(errorBox, t('Please select a position.','يرجى اختيار وظيفة.')); return; }
  if (!facility) { showCvError(errorBox, t('Please select a facility.','يرجى اختيار منشأة.')); return; }

  const btn = wrap.querySelector('.upload-btn');
  btn.disabled = true;
  btn.textContent = L().uploadingBtn;

  try {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('name', name);
    fd.append('position', position);
    fd.append('facility', facility);
    fd.append('phone', phone);
    fd.append('email', email);

    const res = await fetch(WORKER + '/upload-cv-public', { method: 'POST', body: fd });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Upload failed');

    wrap.innerHTML = '';
    wrap.appendChild(el('div', { class: 'success-box' },
      el('div', { class: 'success-icon' }, svgIcon('<path d="M20 6 9 17l-5-5"/>', 32, '#fff')),
      el('div', { style: 'font-family:"Playfair Display",serif;font-size:22px;font-weight:600;color:var(--ink);margin-bottom:6px' }, L().cvSuccess),
      el('div', { style: 'font-size:14px;color:var(--ink2)' }, L().cvSuccessSub + ' ', el('strong', {}, data.cvID))
    ));
  } catch (e) {
    btn.disabled = false;
    btn.textContent = L().uploadBtn;
    showCvError(errorBox, e.message || t('Something went wrong. Please try again.','حدث خطأ ما. يرجى المحاولة مرة أخرى.'));
  }
}
function showCvError(box, msg) {
  box.textContent = msg;
  box.style.display = 'block';
}

  card.appendChild(fieldsRow);

  const errorBox = el('div', { class: 'error-msg', style: 'display:none' });
  card.appendChild(errorBox);

  const resultBox = el('div', { style: 'display:none' });
  card.appendChild(resultBox);

  const checkBtn = el('button', { class: 'tracker-btn' }, L().trackBtn);
  checkBtn.addEventListener('click', async () => {
    const firstName = firstNameInput.value.trim();
    const id = idInput.value.trim().toUpperCase();
    errorBox.style.display = 'none';
    resultBox.style.display = 'none';
    resultBox.innerHTML = '';

    if (!firstName) { errorBox.textContent = t('Please enter your first name.','يرجى إدخال اسمك الأول.'); errorBox.style.display='block'; return; }
    if (!id) { errorBox.textContent = t('Please enter your reference ID.','يرجى إدخال الرقم المرجعي.'); errorBox.style.display='block'; return; }

    checkBtn.disabled = true;
    checkBtn.textContent = '…';
    try {
      const res = await fetch(WORKER + '/track-status?id=' + encodeURIComponent(id) + '&firstName=' + encodeURIComponent(firstName));
      const data = await res.json();
      if (!data.found) {
        errorBox.textContent = L().trackNotFound;
        errorBox.style.display = 'block';
      } else {
        resultBox.appendChild(el('div', { class: 'status-result' },
          statusRow(L().statusPosition, data.position),
          statusRow(L().statusEntity, fullEntityName(data.entity)),
          statusRow(L().statusSubmitted, fmtDateDDMMYYYY(data.submittedDate)),
          statusRow(L().statusCurrent, L().statusLabels[data.status] || data.status)
        ));
        resultBox.style.display = 'block';
      }
    } catch (e) {
      errorBox.textContent = t('Something went wrong. Please try again.','حدث خطأ ما. يرجى المحاولة مرة أخرى.');
      errorBox.style.display = 'block';
    }
    checkBtn.disabled = false;
    checkBtn.textContent = L().trackBtn;
  });
  card.appendChild(checkBtn);

  section.appendChild(card);
  return section;
}
function statusRow(label, val) {
  return el('div', { class: 'status-row' }, el('span', { style:'color:var(--muted)' }, label), el('strong', {}, val || '—'));
}

function renderFooter() {
  return el('footer', { class: 'footer' },
    el('img', { class: 'footer-logo', src: '/logo.png', alt: 'HiFive Holdings' }),
    el('div', { class: 'footer-links' },
      el('a', { href: 'mailto:' + CAREERS_EMAIL }, CAREERS_EMAIL),
      el('a', { href: '#positions', onclick: (e)=>{e.preventDefault();scrollToId('positions');} }, L().navPositions),
      el('a', { href: '#tracker', onclick: (e)=>{e.preventDefault();scrollToId('tracker');} }, L().navTrack)
    ),
    el('div', { class: 'footer-divider' }),
    el('div', { class: 'footer-disclaimer' },
      L().footerDisclaimer,
      el('a', { href: 'mailto:' + CAREERS_EMAIL, style:'color:rgba(255,255,255,.6);text-decoration:underline' }, CAREERS_EMAIL),
      '. © ' + new Date().getFullYear() + ' HiFive Holdings LLC. ' + t('All rights reserved.','جميع الحقوق محفوظة.')
    )
  );
}

function renderApp() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  root.appendChild(renderNav());
  root.appendChild(renderHero());
  root.appendChild(renderWhy());
  root.appendChild(renderPositions());
  root.appendChild(renderCvDrop());
  root.appendChild(renderTracker());
  root.appendChild(renderFooter());
}

renderApp();
loadPositions();
</script>
</body>
</html>
